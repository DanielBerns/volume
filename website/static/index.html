<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plant Volume Estimator</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #eef; display: none; border-radius: 5px;}
    </style>
</head>
<body>
    <h2>Upload Orthogonal Photographs</h2>
    <form id="uploadForm">
        <div class="form-group">
            <label>XY Axis Photo (Contrasting Background):</label>
            <input type="file" id="photo_xy" accept="image/jpeg, image/png" required>
        </div>
        <div class="form-group">
            <label>YZ Axis Photo (Contrasting Background):</label>
            <input type="file" id="photo_yz" accept="image/jpeg, image/png" required>
        </div>
        <div class="form-group">
            <label>XZ Axis Photo (Standard Background):</label>
            <input type="file" id="photo_xz" accept="image/jpeg, image/png" required>
        </div>
        <button type="submit">Calculate Volume</button>
    </form>

    <div id="result">
        <h3>Estimation Complete</h3>
        <p><strong>Calculated Volume:</strong> <span id="volumeOutput"></span> m³</p>
        <p><em>Check the generated 'data' folder for the saved run files.</em></p>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('photo_xy', document.getElementById('photo_xy').files[0]);
            formData.append('photo_yz', document.getElementById('photo_yz').files[0]);
            formData.append('photo_xz', document.getElementById('photo_xz').files[0]);

            try {
                const response = await fetch('/api/calculate-volume', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('volumeOutput').innerText = data.estimated_volume_m3.toFixed(6);
                    document.getElementById('result').style.display = 'block';
                } else {
                    alert("Error: " + data.detail);
                }
            } catch (error) {
                console.error('Error:', error);
                alert("Failed to connect to the server.");
            }
        });
    </script>
</body>
</html>
